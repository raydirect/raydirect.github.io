<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Style | RayDirect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font feel similar to the snippet */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .hero-text { font-size: clamp(3rem, 10vw, 8rem); line-height: 0.9; }
    </style>
</head>
<body class="bg-[#000] text-white selection:bg-yellow-400 selection:text-black">

    <nav class="fixed top-0 w-full z-50 p-8 flex justify-between items-center mix-blend-difference">
        <div class="font-bold text-2xl uppercase tracking-tighter">RayDirect</div>
        <div class="hidden md:flex gap-x-8 uppercase text-xs font-medium tracking-widest">
            <a href="#" class="hover:opacity-50 transition">Work</a>
            <a href="#" class="hover:opacity-50 transition">Services</a>
            <a href="#" class="hover:opacity-50 transition">Contact</a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-end p-8 pb-20 md:p-16">
        <h1 class="hero-text font-black uppercase tracking-tighter mb-8">
            Lead by <br> <span class="text-gray-500 italic">Design.</span>
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <p class="md:col-span-5 text-xl text-gray-400">
                Building digital products that define the future of high-scale automation and creative strategy.
            </p>
        </div>
    </section>

    <section class="p-8 md:p-16 border-t border-white/10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <div class="group cursor-pointer">
                <div class="overflow-hidden rounded-lg bg-gray-900 aspect-video mb-6">
                    <div class="w-full h-full bg-gradient-to-tr from-purple-900 to-blue-900 group-hover:scale-105 transition duration-700"></div>
                </div>
                <h3 class="text-2xl font-bold uppercase">Mini Z-Brain</h3>
                <p class="text-gray-500 uppercase text-sm tracking-widest">AI Orchestration</p>
            </div>
            <div class="group cursor-pointer md:mt-32">
                <div class="overflow-hidden rounded-lg bg-gray-900 aspect-square mb-6">
                    <div class="w-full h-full bg-gradient-to-tr from-orange-900 to-red-900 group-hover:scale-105 transition duration-700"></div>
                </div>
                <h3 class="text-2xl font-bold uppercase">Digital Commerce</h3>
                <p class="text-gray-500 uppercase text-sm tracking-widest">Strategy & Lead</p>
            </div>
        </div>
    </section>

</body>
</html>
